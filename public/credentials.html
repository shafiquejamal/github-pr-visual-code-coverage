<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>credentials</title>
		<link href="css/credentials.css" rel="stylesheet" />
	</head>
	<body>
		<div class="credentials-container">
			<div class="sidebar left">
				<form>
					<button>data cache</button>
					<button class="credentials-tab-btn">credentials</button>
					<button>customization</button>
				</form>
			</div>
			<div class="main-content right">
				<h1>
					Github Token Classic
					<span>(repo)</span>
				</h1>
				<form>
					<div>
						<input
							type="text"
							name="gh-token-classic-input"
							placeholder="paste your token here"
							spellcheck="false"
							data-transparent-text="true"
						/>
						<span class="creds-input-preview"></span>
					</div>
					<div class="btn-container">
						<button data-show-creds="false" class="toggle-token-btn">
							<img
								src="images/show-password.svg"
								alt="show-password-icon"
								class="show-password-icon"
							/>
							<img
								src="images/hide-password.svg"
								alt="hide-password-icon"
								class="hide-password-icon"
							/>
						</button>
						<button disabled class="update-token-btn" type="submit">
							update
						</button>
					</div>
				</form>
				<label for="fully-masked-token-checkbox">
					<input
						type="checkbox"
						id="fully-masked-token-checkbox"
						name="fully-masked-token-checkbox"
					/>
					fully masked token
				</label>
			</div>
		</div>
		<script type="module" src="scripts/credentials.js"></script>
	</body>
</html>
